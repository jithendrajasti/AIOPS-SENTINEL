name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]

jobs:
  # ── Type Check ────────────────────────────────────────────────────────────────
  type-check:
    name: Type Check — ${{ matrix.service }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [log-collector, central-brain]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: services/${{ matrix.service }}/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: services/${{ matrix.service }}

      - name: Type check
        run: npm run type-check
        working-directory: services/${{ matrix.service }}

  # ── Unit Tests ────────────────────────────────────────────────────────────────
  test:
    name: Unit Tests — central-brain
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: services/central-brain/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: services/central-brain

      - name: Run tests
        run: npm test
        working-directory: services/central-brain

  # ── Docker Build Verification ─────────────────────────────────────────────────
  docker-build:
    name: Docker Build — ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: [type-check, test]
    strategy:
      fail-fast: false
      matrix:
        service: [log-collector, central-brain]

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build image (no push)
        uses: docker/build-push-action@v5
        with:
          context: ./services/${{ matrix.service }}
          push: false
          tags: aiops/${{ matrix.service }}:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
